<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 596 385">
  <defs>
    <style>
      .st0 {
        fill: #fff;
      }

      .st1 {
        fill: #971fb0;
        fill-opacity: .65;
      }

      /* Left circle — slides in from left */
      #left-circle {
        transform-box: fill-box;
        transform-origin: center;
        animation: slideInLeft 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      /* Left stroke — draws itself after sliding in */
      #left-stroke {
        fill: none;
        stroke: #4c005b;
        stroke-opacity: .2;
        stroke-width: 15px;
        stroke-dasharray: 1300;
        stroke-dashoffset: 1300;
        transform-box: fill-box;
        transform-origin: center;
        animation:
          slideInLeft 0.9s cubic-bezier(0.16, 1, 0.3, 1) both,
          drawStroke 1.4s ease-out 0.4s both;
      }

      /* Right circle — slides in from right */
      #right-circle {
        transform-box: fill-box;
        transform-origin: center;
        animation: slideInRight 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
      }

      /* Right stroke — draws itself after sliding in */
      #right-stroke {
        fill: none;
        stroke: #4c005b;
        stroke-opacity: .2;
        stroke-width: 15px;
        stroke-dasharray: 1300;
        stroke-dashoffset: 1300;
        transform-box: fill-box;
        transform-origin: center;
        animation:
          slideInRight 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both,
          drawStroke 1.4s ease-out 0.6s both;
      }

      /* PRODUCT label — fades up */
      #text-product {
        animation: fadeInUp 0.6s ease-out 0.8s both;
      }

      /* MARKETING label — fades up slightly later */
      #text-marketing {
        animation: fadeInUp 0.6s ease-out 1.0s both;
      }

      /* NANDOR center label — pops in with a spring */
      #text-nandor {
        transform-box: fill-box;
        transform-origin: center;
        animation: popIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 1.2s both;
      }

      @keyframes slideInLeft {
        from {
          transform: translateX(-50px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideInRight {
        from {
          transform: translateX(50px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes drawStroke {
        from {
          stroke-dashoffset: 1300;
        }
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.6);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </defs>

